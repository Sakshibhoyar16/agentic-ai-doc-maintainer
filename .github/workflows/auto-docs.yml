name: Automated Documentation Updater

on:
  push:
    branches:
      - main

jobs:

  update-docs:

    runs-on: ubuntu-latest

    steps:

      # Step 1 - Download repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Install Python
      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11'

      # Step 3 - Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Step 4 - Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "AI Documentation Bot"
          git config --global user.email "bot@example.com"

      # Step 5 - Run AI system
      - name: Run AI Documentation Maintainer

        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_REPO_PATH: ./agentic-test-repo

        run: |
          python main.py

      # Step 6 - Commit and Push Changes
      - name: Commit and Push Documentation

        run: |
          git add .
          git commit -m "AI updated documentation" || echo "No changes to commit"
          git push